<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AgentSON Viewer</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../../shared/design-tokens.css">
    <style>
        :root {
            --bg: #0d1117;
            --bg-card: #161b22;
            --bg-code: #0d1117;
            --bg-header: #1c2128;
            --border: #30363d;
            --border-mid: #404850;
            --text: #c9d1d9;
            --text-dim: #b0b8c0;
            --muted: #8b949e;
            --accent: #58a6ff;
            --blue: #58a6ff;
            --green: #3fb950;
            --orange: #d29922;
            --red: #f85149;
            --purple: #bc8cff;
            --blue-bg: rgba(88, 166, 255, 0.12);
            --green-bg: rgba(63, 185, 80, 0.12);
            --orange-bg: rgba(210, 153, 34, 0.12);
            --red-bg: rgba(248, 81, 73, 0.12);
            --purple-bg: rgba(188, 140, 255, 0.12);
        }
        body { background: var(--bg); color: var(--text); font-family: var(--font-ui); }

        header { border-bottom: 1px solid var(--border); padding: 20px 0; margin-bottom: 20px; }
        h1 { font-family: var(--font-code); font-size: 24px; font-weight: 600; }
        h1 span { color: var(--accent); }

        .drop-zone {
            border: 2px dashed var(--border); border-radius: var(--radius); padding: 40px;
            text-align: center; cursor: pointer; transition: border-color var(--t-fast);
            margin-bottom: 20px;
        }
        .drop-zone:hover, .drop-zone.dragover { border-color: var(--accent); }
        .drop-zone p { color: var(--muted); margin-bottom: 10px; }
        #fileInput { display: none; }

        .session-info {
            background: var(--bg-card); border: 1px solid var(--border);
            border-radius: var(--radius); padding: 16px; margin-bottom: 20px;
        }
        .session-info h2 { font-family: var(--font-code); font-size: 16px; margin-bottom: 12px; }
        .meta-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 12px; }
        .meta-item { font-size: 14px; }
        .meta-item .label { color: var(--muted); }

        .entries { display: flex; flex-direction: column; gap: 12px; }
        .entry {
            background: var(--bg-card); border: 1px solid var(--border);
            border-radius: var(--radius); padding: 16px;
        }
        .entry-header { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
        .entry-type {
            font-size: 12px; padding: 2px 8px; border-radius: 4px;
            font-weight: 500; font-family: var(--font-code);
        }
        .type-user-query { background: var(--blue-bg); color: var(--blue); }
        .type-thought { background: var(--orange-bg); color: var(--orange); }
        .type-action { background: var(--green-bg); color: var(--green); }
        .type-answer { background: var(--purple-bg); color: var(--purple); }
        .type-side-effect { background: var(--red-bg); color: var(--red); }
        .type-context { background: var(--purple-bg); color: var(--purple); }
        .type-tool { background: var(--green-bg); color: var(--green); }

        .entry-content { font-size: 14px; white-space: pre-wrap; word-break: break-word; }
        .entry-content code {
            background: var(--bg-code); padding: 2px 6px; border-radius: 4px;
            font-family: var(--font-code); font-size: 13px;
        }
        .entry-content pre {
            background: var(--bg-code); padding: 12px; border-radius: 4px;
            overflow-x: auto; margin-top: 8px;
        }
        .entry-content pre code { padding: 0; background: none; }

        .metrics {
            display: flex; gap: 16px; flex-wrap: wrap; margin-top: 12px;
            padding-top: 12px; border-top: 1px solid var(--border);
            font-size: 13px; color: var(--muted); font-family: var(--font-code);
        }
        .no-session { text-align: center; padding: 40px; color: var(--muted); }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1><span>Agent</span>SON Viewer</h1>
        </header>

        <div class="drop-zone" id="dropZone">
            <p>Drag & drop an <strong>.AgentSON</strong> file here</p>
            <p>or click to select</p>
            <input type="file" id="fileInput" accept=".json,.AgentSON,.agentson">
        </div>

        <div id="content">
            <div class="no-session">No session loaded. Drop a file to begin.</div>
        </div>
    </div>

    <script>
        const dropZone = document.getElementById('dropZone');
        const fileInput = document.getElementById('fileInput');
        const content = document.getElementById('content');

        dropZone.addEventListener('click', () => fileInput.click());
        dropZone.addEventListener('dragover', (e) => { e.preventDefault(); dropZone.classList.add('dragover'); });
        dropZone.addEventListener('dragleave', () => { dropZone.classList.remove('dragover'); });
        dropZone.addEventListener('drop', (e) => {
            e.preventDefault();
            dropZone.classList.remove('dragover');
            const file = e.dataTransfer.files[0];
            if (file) readFile(file);
        });
        fileInput.addEventListener('change', (e) => { const file = e.target.files[0]; if (file) readFile(file); });

        function readFile(file) {
            const reader = new FileReader();
            reader.onload = (e) => {
                try {
                    const data = JSON.parse(e.target.result);
                    renderSession(data);
                } catch (err) {
                    content.innerHTML = `<div class="no-session">Error parsing file: ${err.message}</div>`;
                }
            };
            reader.readAsText(file);
        }

        function renderSession(data) {
            const tool = data.tool || {};
            const agent = data.agent || {};
            const entries = data.entries || [];
            const metrics = data.metrics || {};

            let html = `
                <div class="session-info">
                    <h2>Session: ${data.id || 'Unknown'}</h2>
                    <div class="meta-grid">
                        <div class="meta-item"><span class="label">Tool:</span> ${tool.name || 'Unknown'}</div>
                        <div class="meta-item"><span class="label">Agent:</span> ${agent.name || 'Unknown'}</div>
                        <div class="meta-item"><span class="label">Model:</span> ${agent.model || 'Unknown'}</div>
                        <div class="meta-item"><span class="label">Started:</span> ${data.started_at || 'Unknown'}</div>
                        <div class="meta-item"><span class="label">Entries:</span> ${entries.length}</div>
                    </div>
                </div>
                <div class="entries">
            `;

            for (const entry of entries) {
                const type = entry.type || entry.role || 'unknown';
                const typeClass = `type-${type.replace(/[^a-z-]/g, '-')}`;
                let body = '';
                if (entry.text) body += escapeHtml(entry.text);
                if (entry.code) body += `<pre><code>${escapeHtml(entry.code)}</code></pre>`;
                if (entry.output) body += `<div class="label">Output:</div><pre><code>${escapeHtml(entry.output)}</code></pre>`;
                if (entry.query) body += escapeHtml(entry.query);
                html += `
                    <div class="entry">
                        <div class="entry-header"><span class="entry-type ${typeClass}">${type}</span></div>
                        <div class="entry-content">${body || '<em>No content</em>'}</div>
                    </div>
                `;
            }
            html += '</div>';

            if (metrics.total_tokens || metrics.cost) {
                html += `<div class="metrics">
                    ${metrics.total_tokens ? `<span>Tokens: ${metrics.total_tokens.toLocaleString()}</span>` : ''}
                    ${metrics.cost ? `<span>Cost: $${metrics.cost.toFixed(4)}</span>` : ''}
                    ${metrics.total_turns ? `<span>Turns: ${metrics.total_turns}</span>` : ''}
                    ${metrics.total_tool_calls ? `<span>Tool Calls: ${metrics.total_tool_calls}</span>` : ''}
                </div>`;
            }
            content.innerHTML = html;
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
    </script>
</body>
</html>
