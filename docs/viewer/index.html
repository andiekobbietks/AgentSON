<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AgentSON Viewer</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=IBM+Plex+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0a0a08;
            --surface: #141410;
            --border: #2a2a1e;
            --text: #e8e0c8;
            --text-muted: #9a9070;
            --accent: #ffb000;
            --success: #a0d060;
            --warning: #ffb000;
            --error: #e05040;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'IBM Plex Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.6;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }

        header {
            border-bottom: 1px solid var(--border);
            padding: 20px 0;
            margin-bottom: 20px;
        }

        h1 {
            font-size: 24px;
            font-weight: 600;
        }

        h1 span {
            color: var(--accent);
        }

        .drop-zone {
            border: 2px dashed var(--border);
            border-radius: 8px;
            padding: 40px;
            text-align: center;
            margin-bottom: 20px;
            cursor: pointer;
            transition: border-color 0.2s;
        }

        .drop-zone:hover,
        .drop-zone.dragover {
            border-color: var(--accent);
        }

        .drop-zone p {
            color: var(--text-muted);
            margin-bottom: 10px;
        }

        .session-info {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 16px;
            margin-bottom: 20px;
        }

        .session-info h2 {
            font-size: 16px;
            margin-bottom: 12px;
        }

        .meta-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 12px;
        }

        .meta-item {
            font-size: 14px;
        }

        .meta-item .label {
            color: var(--text-muted);
        }

        .entries {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .entry {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 16px;
        }

        .entry-header {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 8px;
        }

        .entry-type {
            font-size: 12px;
            padding: 2px 8px;
            border-radius: 4px;
            font-weight: 500;
        }

        .type-user-query { background: var(--accent); color: #0a0a08; }
        .type-thought { background: var(--warning); color: #0a0a08; }
        .type-action { background: var(--success); color: #0a0a08; }
        .type-answer { background: var(--text-muted); color: #0a0a08; }
        .type-side-effect { background: var(--error); color: #fff; }
        .type-context { background: #8a6020; color: #fff; }
        .type-tool { background: #a0d060; color: #0a0a08; }

        .entry-content {
            font-size: 14px;
            white-space: pre-wrap;
            word-break: break-word;
        }

        .entry-content code {
            background: var(--bg);
            padding: 2px 6px;
            border-radius: 4px;
            font-family: 'SF Mono', Monaco, monospace;
            font-size: 13px;
        }

        .entry-content pre {
            background: var(--bg);
            padding: 12px;
            border-radius: 4px;
            overflow-x: auto;
            margin-top: 8px;
        }

        .entry-content pre code {
            padding: 0;
            background: none;
        }

        .metrics {
            display: flex;
            gap: 16px;
            flex-wrap: wrap;
            margin-top: 12px;
            padding-top: 12px;
            border-top: 1px solid var(--border);
            font-size: 13px;
            color: var(--text-muted);
        }

        .no-session {
            text-align: center;
            padding: 40px;
            color: var(--text-muted);
        }

        #fileInput {
            display: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1><span>Agent</span>SON Viewer</h1>
        </header>

        <div class="drop-zone" id="dropZone">
            <p>Drag & drop an <strong>.AgentSON</strong> file here</p>
            <p>or click to select</p>
            <input type="file" id="fileInput" accept=".json,.AgentSON,.agentson">
        </div>

        <div id="content">
            <div class="no-session">
                No session loaded. Drop a file to begin.
            </div>
        </div>
    </div>

    <script>
        const dropZone = document.getElementById('dropZone');
        const fileInput = document.getElementById('fileInput');
        const content = document.getElementById('content');

        dropZone.addEventListener('click', () => fileInput.click());

        dropZone.addEventListener('dragover', (e) => {
            e.preventDefault();
            dropZone.classList.add('dragover');
        });

        dropZone.addEventListener('dragleave', () => {
            dropZone.classList.remove('dragover');
        });

        dropZone.addEventListener('drop', (e) => {
            e.preventDefault();
            dropZone.classList.remove('dragover');
            const file = e.dataTransfer.files[0];
            if (file) readFile(file);
        });

        fileInput.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (file) readFile(file);
        });

        function readFile(file) {
            const reader = new FileReader();
            reader.onload = (e) => {
                try {
                    const data = JSON.parse(e.target.result);
                    renderSession(data);
                } catch (err) {
                    content.innerHTML = `<div class="no-session">Error parsing file: ${err.message}</div>`;
                }
            };
            reader.readAsText(file);
        }

        function renderSession(data) {
            const tool = data.tool || {};
            const agent = data.agent || {};
            const entries = data.entries || [];
            const metrics = data.metrics || {};

            let html = `
                <div class="session-info">
                    <h2>Session: ${data.id || 'Unknown'}</h2>
                    <div class="meta-grid">
                        <div class="meta-item">
                            <span class="label">Tool:</span> ${tool.name || 'Unknown'}
                        </div>
                        <div class="meta-item">
                            <span class="label">Agent:</span> ${agent.name || 'Unknown'}
                        </div>
                        <div class="meta-item">
                            <span class="label">Model:</span> ${agent.model || 'Unknown'}
                        </div>
                        <div class="meta-item">
                            <span class="label">Started:</span> ${data.started_at || 'Unknown'}
                        </div>
                        <div class="meta-item">
                            <span class="label">Entries:</span> ${entries.length}
                        </div>
                    </div>
                </div>
                <div class="entries">
            `;

            for (const entry of entries) {
                const type = entry.type || entry.role || 'unknown';
                const typeClass = `type-${type.replace(/[^a-z-]/g, '-')}`;
                
                let content = '';
                if (entry.text) {
                    content += escapeHtml(entry.text);
                }
                if (entry.code) {
                    content += `<pre><code>${escapeHtml(entry.code)}</code></pre>`;
                }
                if (entry.output) {
                    content += `<div class="label">Output:</div><pre><code>${escapeHtml(entry.output)}</code></pre>`;
                }
                if (entry.query) {
                    content += escapeHtml(entry.query);
                }

                html += `
                    <div class="entry">
                        <div class="entry-header">
                            <span class="entry-type ${typeClass}">${type}</span>
                        </div>
                        <div class="entry-content">${content || '<em>No content</em>'}</div>
                    </div>
                `;
            }

            html += '</div>';

            if (metrics.total_tokens || metrics.cost) {
                html += `
                    <div class="metrics">
                        ${metrics.total_tokens ? `<span>Tokens: ${metrics.total_tokens.toLocaleString()}</span>` : ''}
                        ${metrics.cost ? `<span>Cost: $${metrics.cost.toFixed(4)}</span>` : ''}
                        ${metrics.total_turns ? `<span>Turns: ${metrics.total_turns}</span>` : ''}
                        ${metrics.total_tool_calls ? `<span>Tool Calls: ${metrics.total_tool_calls}</span>` : ''}
                    </div>
                `;
            }

            content.innerHTML = html;
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
    </script>
</body>
</html>
