<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 — AgentSON</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=IBM+Plex+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0a0a08;
            --surface: #141410;
            --border: #2a2a1e;
            --text: #e8e0c8;
            --text-muted: #9a9070;
            --accent: #ffb000;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'IBM Plex Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.6;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            text-align: center;
        }
        .container { max-width: 500px; padding: 40px 20px; }
        h1 {
            font-family: 'Space Mono', monospace;
            font-size: 72px;
            color: var(--accent);
            margin-bottom: 10px;
        }
        p { color: var(--text-muted); margin-bottom: 30px; }
        .btn {
            display: inline-block;
            padding: 12px 24px;
            background: var(--accent);
            color: #0a0a08;
            text-decoration: none;
            border-radius: 6px;
            font-family: 'Space Mono', monospace;
            font-weight: 600;
            margin: 5px;
        }
        .btn:hover { opacity: 0.9; }
        .btn-outline {
            background: transparent;
            border: 1px solid var(--accent);
            color: var(--accent);
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>404</h1>
        <p>Page not found. This page doesn't exist yet — or it moved.</p>
        <a href="../" class="btn">Back to AgentSON</a>
        <a href="https://github.com/andiekobbietks/AgentSON" class="btn btn-outline">GitHub</a>
    </div>
</body>
</html>
