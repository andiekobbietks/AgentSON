<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SOP — AgentSON</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=IBM+Plex+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0a0a08;
            --surface: #141410;
            --border: #2a2a1e;
            --text: #e8e0c8;
            --text-muted: #9a9070;
            --accent: #ffb000;
            --success: #a0d060;
            --error: #e05040;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'IBM Plex Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.7;
        }
        .container { max-width: 800px; margin: 0 auto; padding: 20px; }
        header { padding: 30px 0; border-bottom: 1px solid var(--border); margin-bottom: 30px; }
        .back { color: var(--accent); text-decoration: none; font-size: 14px; }
        .back:hover { text-decoration: underline; }
        h1 { font-family: 'Space Mono', monospace; font-size: 28px; margin-top: 16px; }
        h2 { font-family: 'Space Mono', monospace; font-size: 22px; color: var(--accent); margin: 30px 0 12px; }
        h3 { font-family: 'Space Mono', monospace; font-size: 18px; margin: 24px 0 10px; }
        h4 { font-size: 16px; margin: 18px 0 8px; color: var(--text-muted); }
        p { margin-bottom: 14px; }
        strong { color: var(--accent); }
        a { color: var(--accent); }
        ul, ol { margin: 10px 0 14px 24px; }
        li { margin-bottom: 6px; }
        hr { border: none; border-top: 1px solid var(--border); margin: 24px 0; }
        code {
            font-family: 'Space Mono', monospace;
            background: var(--surface);
            padding: 2px 6px;
            border-radius: 4px;
            font-size: 13px;
        }
        pre {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 16px;
            overflow-x: auto;
            margin: 14px 0;
        }
        pre code { background: none; padding: 0; font-size: 13px; }
        table {
            width: 100%;
            border-collapse: collapse;
            margin: 14px 0;
            font-size: 14px;
        }
        th, td {
            border: 1px solid var(--border);
            padding: 10px 14px;
            text-align: left;
        }
        th { background: var(--surface); font-weight: 600; color: var(--accent); }
        blockquote {
            border-left: 3px solid var(--accent);
            padding-left: 16px;
            color: var(--text-muted);
            margin: 14px 0;
        }
        .loading { color: var(--text-muted); padding: 40px 0; text-align: center; }
        .error { color: var(--error); padding: 40px 0; text-align: center; }
        .meta { font-size: 13px; color: var(--text-muted); margin-top: 8px; }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <a href="../" class="back">&larr; Back to AgentSON</a>
            <a href="./" class="back" style="margin-left: 20px;">All SOPs</a>
            <div id="titleWrap"><h1 id="title">Loading...</h1></div>
            <div class="meta" id="meta"></div>
        </header>
        <div id="content" class="loading">Loading SOP...</div>
    </div>

    <script>
        function renderMd(md) {
            let html = md
                .replace(/^```(\w*)\n([\s\S]*?)^```/gm, function(m, lang, code) {
                    return '<pre><code class="lang-' + lang + '">' + escapeHtml(code.trim()) + '</code></pre>';
                })
                .replace(/`([^`]+)`/g, '<code>$1</code>')
                .replace(/^#### (.+)$/gm, '<h4>$1</h4>')
                .replace(/^### (.+)$/gm, '<h3>$1</h3>')
                .replace(/^## (.+)$/gm, '<h2>$1</h2>')
                .replace(/^# (.+)$/gm, '<h1 style="font-size:24px;margin:20px 0 10px">$1</h1>')
                .replace(/^\*\*(.+?)\*\*$/gm, '<strong>$1</strong>')
                .replace(/^\*(.+?)\*$/gm, '<em>$1</em>')
                .replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2">$1</a>')
                .replace(/^---$/gm, '<hr>')
                .replace(/^> (.+)$/gm, '<blockquote>$1</blockquote>');

            const lines = html.split('\n');
            let result = [];
            let inTable = false;
            let inList = false;

            for (let i = 0; i < lines.length; i++) {
                const line = lines[i];
                const isTableRow = line.trim().startsWith('|') && line.trim().endsWith('|');
                const isSeparator = /^\|[\s\-:|]+\|$/.test(line.trim());

                if (isTableRow && !inTable) {
                    inTable = true;
                    result.push('<table>');
                } else if (!isTableRow && inTable) {
                    inTable = false;
                    result.push('</table>');
                }

                if (isSeparator) continue;

                if (isTableRow) {
                    const cells = line.split('|').filter(c => c.trim() !== '');
                    const isFirstTableRow = result.length === 0 || result[result.length-1] === '<table>' || (result[result.length-1].startsWith('<tr>') && !result.some((r,j) => j > result.lastIndexOf('<table>') && r.startsWith('<tr>')));
                    if (isFirstTableRow) {
                        result.push('<tr>' + cells.map(c => '<th>' + c.trim() + '</th>').join('') + '</tr>');
                    } else {
                        result.push('<tr>' + cells.map(c => '<td>' + c.trim() + '</td>').join('') + '</tr>');
                    }
                    continue;
                }

                const isUl = /^[-*] /.test(line.trim());
                const isOl = /^\d+\. /.test(line.trim());

                if (isUl && !inList) {
                    inList = true;
                    result.push('<ul>');
                } else if (isOl && !inList) {
                    inList = true;
                    result.push('<ol>');
                } else if (!isUl && !isOl && inList) {
                    inList = false;
                    if (result[result.length-1].startsWith('<li>')) {
                        const lastUl = result.lastIndexOf('<ul>');
                        const lastOl = result.lastIndexOf('<ol>');
                        if (lastUl > lastOl) result.push('</ul>');
                        else result.push('</ol>');
                    }
                }

                if (isUl) {
                    result.push('<li>' + line.trim().replace(/^[-*] /, '') + '</li>');
                } else if (isOl) {
                    result.push('<li>' + line.trim().replace(/^\d+\. /, '') + '</li>');
                } else if (line.trim() === '') {
                    result.push('');
                } else if (!line.startsWith('<h') && !line.startsWith('<pre') && !line.startsWith('<table') && !line.startsWith('<tr') && !line.startsWith('<hr') && !line.startsWith('<blockquote') && !line.startsWith('<ul') && !line.startsWith('<ol') && !line.startsWith('<li')) {
                    result.push('<p>' + line + '</p>');
                } else {
                    result.push(line);
                }
            }

            if (inList) {
                if (result[result.length-1] && result[result.length-1].startsWith('<li>')) {
                    const lastUl = result.lastIndexOf('<ul>');
                    const lastOl = result.lastIndexOf('<ol>');
                    if (lastUl > lastOl) result.push('</ul>');
                    else result.push('</ol>');
                }
            }
            if (inTable) result.push('</table>');

            return result.join('\n');
        }

        function escapeHtml(t) {
            return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
        }

        async function load() {
            const params = new URLSearchParams(window.location.search);
            const file = params.get('file');
            if (!file) {
                document.getElementById('content').innerHTML = '<div class="error">No file specified. <a href="../sops/">Go back to SOPs</a></div>';
                return;
            }

            document.getElementById('title').textContent = file.replace(/\.md$/, '').replace(/-/g, ' ');

            try {
                const resp = await fetch(file);
                if (!resp.ok) throw new Error('File not found: ' + file);
                const md = await resp.text();

                const titleMatch = md.match(/^#\s+(.+)$/m);
                if (titleMatch) document.getElementById('title').textContent = titleMatch[1];

                const versionMatch = md.match(/\*\*Version:\*\*\s*(.+)/);
                const dateMatch = md.match(/\*\*Date:\*\*\s*(.+)/);
                if (versionMatch || dateMatch) {
                    let meta = '';
                    if (versionMatch) meta += 'Version: ' + versionMatch[1].trim();
                    if (versionMatch && dateMatch) meta += ' &middot; ';
                    if (dateMatch) meta += 'Date: ' + dateMatch[1].trim();
                    document.getElementById('meta').innerHTML = meta;
                }

                document.getElementById('content').innerHTML = renderMd(md);
            } catch (err) {
                document.getElementById('content').innerHTML = '<div class="error">' + escapeHtml(err.message) + '<br><br><a href="../sops/">Back to SOPs</a></div>';
            }
        }

        load();
    </script>
</body>
</html>
